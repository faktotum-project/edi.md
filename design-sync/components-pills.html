<!-- @dsCard group="Components" name="Badge e pill — varianti" -->
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edi.md — Badge e pill</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Lato:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Base condivisa card design-sync — token copiati da design-system.css :root */
:root {
  --white: #ffffff;
  --cursor-orange: #f54e00;
  --ink: #26251e;
  --color-bg: #f7f7f4;
  --color-bg-muted: #efeee8;
  --color-bg-subtle: #fafaf7;
  --color-surface: var(--white);
  --color-surface-strong: var(--ink);
  --color-text: var(--ink);
  --color-text-muted: #5a5852;
  --color-text-soft: #807d72;
  --color-text-inverse: var(--white);
  --color-border: #e6e5e0;
  --color-border-muted: #efeee8;
  --color-border-strong: var(--ink);
  --color-accent: var(--cursor-orange);
  --color-accent-hover: #d04200;
  --color-accent-active: #b83a00;
  --color-accent-deep: #c73a00;
  --color-accent-soft: #fff1e6;
  --color-accent-border: #f5b892;
  --color-focus: var(--cursor-orange);
  --color-danger: #b42318;
  --color-success: #1f8a65;
  --color-warning: #946200;

  --font-sans: "Lato", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-display: "Inter", system-ui, -apple-system, "Helvetica Neue", sans-serif;
  --font-code: "Fira Code", "Roboto Mono", monospace;
  --font-mono-ui: "Roboto Mono", monospace;

  --tracking-tight: -0.02em;
  --tracking-wide: 0.06em;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-md: 16px;
  --text-lg: clamp(16px, 0.5vw + 15px, 18px);
  --text-xl: clamp(20px, 1vw + 16px, 24px);
  --text-2xl: clamp(25px, 1.8vw + 18px, 32px);
  --text-3xl: clamp(33px, 2.8vw + 22px, 44px);

  --leading-xs: 1.35;
  --leading-sm: 1.45;
  --leading-md: 1.5;
  --leading-lg: 1.55;
  --leading-xl: 1.35;
  --leading-2xl: 1.25;
  --leading-3xl: 1.18;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: clamp(20px, 1vw + 16px, 24px);
  --space-6: clamp(24px, 2vw + 16px, 32px);
  --space-7: clamp(34px, 3.5vw + 20px, 48px);

  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;

  --border-thin: 1px solid var(--color-border);
  --border-muted: 1px solid var(--color-border-muted);
  --border-strong: 1px solid var(--color-border-strong);

  --shadow-sm: 0 1px 2px rgb(38 37 30 / 0.04);
  --shadow-md: 0 4px 12px rgb(38 37 30 / 0.06);
  --shadow-focus: 0 0 0 3px rgb(245 78 0 / 0.25);

  --duration-fast: 120ms;
  --duration-base: 180ms;
  --duration-slow: 260ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-sans);
  font-size: var(--text-md);
  line-height: var(--leading-md);
  padding: var(--space-6);
  -webkit-font-smoothing: antialiased;
}

.card-label {
  font-family: var(--font-mono-ui);
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-soft);
}

.ds-badge {
  display: inline-flex; min-height: 24px; align-items: center; gap: var(--space-1);
  border: 1px solid transparent; border-radius: var(--radius-pill);
  font-size: var(--text-xs); font-weight: 700; line-height: var(--leading-xs);
  padding: 3px var(--space-2); white-space: nowrap;
}
.ds-badge--neutral { background: var(--color-bg-muted); color: var(--color-text-muted); }
.ds-badge--accent { border-color: var(--color-accent-border); background: var(--color-accent-soft); color: var(--color-text); }
.ds-badge--technical { border-color: var(--color-border-muted); background: var(--color-surface); color: var(--color-text-muted); font-family: var(--font-mono-ui); font-weight: 500; }
.ds-status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-soft); }
.ds-status-dot--success { background: var(--color-success); }
.ds-status-dot--warning { background: var(--color-warning); }
.ds-status-dot--danger { background: var(--color-danger); }
.agent-pill {
  display: inline-flex; align-items: center; gap: var(--space-2);
  border: 1.5px solid var(--ink); border-radius: var(--radius-pill);
  background: var(--color-surface); padding: 8px 18px;
  font-family: var(--font-mono-ui); font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide); text-transform: uppercase;
}
.agent-pill--solid { background: var(--ink); color: var(--white); }
.agent-pill__dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-accent); }
.row { display: flex; flex-wrap: wrap; gap: var(--space-3); align-items: center; }
.row + h2 { margin-top: var(--space-6); }
h2 { font-family: var(--font-display); font-weight: 500; font-size: var(--text-lg); letter-spacing: var(--tracking-tight); margin-bottom: var(--space-4); }
</style>
</head>
<body>
<h2>Badge</h2>
<div class="row">
  <span class="ds-badge ds-badge--neutral">Neutral</span>
  <span class="ds-badge ds-badge--accent">Accent</span>
  <span class="ds-badge ds-badge--technical">technical</span>
  <span class="ds-badge ds-badge--technical"><span class="ds-status-dot ds-status-dot--success"></span>online</span>
  <span class="ds-badge ds-badge--technical"><span class="ds-status-dot ds-status-dot--warning"></span>pending</span>
  <span class="ds-badge ds-badge--technical"><span class="ds-status-dot ds-status-dot--danger"></span>error</span>
</div>
<h2>Agent pill — dalla board della hero</h2>
<div class="row">
  <span class="agent-pill"><span class="agent-pill__dot"></span>Agent: Code</span>
  <span class="agent-pill"><span class="agent-pill__dot"></span>Agent: Design</span>
  <span class="agent-pill"><span class="agent-pill__dot"></span>Agent: Deploy</span>
  <span class="agent-pill agent-pill--solid"><span class="agent-pill__dot"></span>Bitcoin</span>
</div>
</body>
</html>
