<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>edi.md — Icone</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Lato:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Base condivisa card design-sync — token copiati da design-system.css :root */
:root {
  --white: #ffffff;
  --cursor-orange: #f54e00;
  --ink: #26251e;
  --color-bg: #f7f7f4;
  --color-bg-muted: #efeee8;
  --color-bg-subtle: #fafaf7;
  --color-surface: var(--white);
  --color-surface-strong: var(--ink);
  --color-text: var(--ink);
  --color-text-muted: #5a5852;
  --color-text-soft: #807d72;
  --color-text-inverse: var(--white);
  --color-border: #e6e5e0;
  --color-border-muted: #efeee8;
  --color-border-strong: var(--ink);
  --color-accent: var(--cursor-orange);
  --color-accent-hover: #d04200;
  --color-accent-active: #b83a00;
  --color-accent-deep: #c73a00;
  --color-accent-soft: #fff1e6;
  --color-accent-border: #f5b892;
  --color-focus: var(--cursor-orange);
  --color-danger: #b42318;
  --color-success: #1f8a65;
  --color-warning: #946200;

  --font-sans: "Lato", system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-display: "Inter", system-ui, -apple-system, "Helvetica Neue", sans-serif;
  --font-code: "Fira Code", "Roboto Mono", monospace;
  --font-mono-ui: "Roboto Mono", monospace;

  --tracking-tight: -0.02em;
  --tracking-wide: 0.06em;

  --text-xs: 12px;
  --text-sm: 14px;
  --text-md: 16px;
  --text-lg: clamp(16px, 0.5vw + 15px, 18px);
  --text-xl: clamp(20px, 1vw + 16px, 24px);
  --text-2xl: clamp(25px, 1.8vw + 18px, 32px);
  --text-3xl: clamp(33px, 2.8vw + 22px, 44px);

  --leading-xs: 1.35;
  --leading-sm: 1.45;
  --leading-md: 1.5;
  --leading-lg: 1.55;
  --leading-xl: 1.35;
  --leading-2xl: 1.25;
  --leading-3xl: 1.18;

  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: clamp(20px, 1vw + 16px, 24px);
  --space-6: clamp(24px, 2vw + 16px, 32px);
  --space-7: clamp(34px, 3.5vw + 20px, 48px);

  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;

  --border-thin: 1px solid var(--color-border);
  --border-muted: 1px solid var(--color-border-muted);
  --border-strong: 1px solid var(--color-border-strong);

  --shadow-sm: 0 1px 2px rgb(38 37 30 / 0.04);
  --shadow-md: 0 4px 12px rgb(38 37 30 / 0.06);
  --shadow-focus: 0 0 0 3px rgb(245 78 0 / 0.25);

  --duration-fast: 120ms;
  --duration-base: 180ms;
  --duration-slow: 260ms;
  --ease-standard: cubic-bezier(0.2, 0, 0, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-sans);
  font-size: var(--text-md);
  line-height: var(--leading-md);
  padding: var(--space-6);
  -webkit-font-smoothing: antialiased;
}

.card-label {
  font-family: var(--font-mono-ui);
  font-size: var(--text-xs);
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--color-text-soft);
}

p.lead { color: var(--color-text-muted); font-size: var(--text-sm); max-width: 560px; margin-bottom: var(--space-5); }
.icons { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: var(--space-3); }
.cell {
  display: grid; gap: var(--space-2); justify-items: center; align-content: center;
  border: var(--border-muted); border-radius: var(--radius-md);
  background: var(--color-surface); padding: var(--space-4);
}
.cell svg { width: 24px; height: 24px; color: var(--ink); }
.cell:hover svg { color: var(--color-accent); }
</style>
</head>
<body>
<p class="lead">24×24, stroke 2px, cap piatti e giunti a spigolo. Geometria ortogonale dove possibile: le icone ereditano il linguaggio a blocchi del monogramma.</p>
<div class="icons">
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="4"/><rect x="4" y="8" width="4" height="12"/><rect x="16" y="8" width="4" height="2"/><rect x="4" y="10" width="16" height="4"/><rect x="4" y="16" width="16" height="4"/></svg>
    <span class="card-label">mark</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="9" y="3" width="6" height="6"/><path d="M5 21v-4h14v4"/></svg>
    <span class="card-label">user</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="card-label">grid</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="13" height="13"/><path d="M8 16v5h13V8h-5"/></svg>
    <span class="card-label">layers</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="3" width="18" height="18"/><path d="M12 7v5h4"/></svg>
    <span class="card-label">clock</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="3" y="5" width="18" height="14"/><path d="M3 7l9 6 9-6"/></svg>
    <span class="card-label">mail</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="4" y="3" width="4" height="4"/><rect x="16" y="3" width="4" height="4"/><rect x="10" y="16" width="4" height="4"/><path d="M6 7v3h12V7"/><path d="M12 10v6"/></svg>
    <span class="card-label">github</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg>
    <span class="card-label">send</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M5 4l14 16"/><path d="M19 4L5 20"/></svg>
    <span class="card-label">x</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M5 4v3"/><path d="M5 11v9"/><path d="M11 20v-9"/><path d="M11 13h5v7"/></svg>
    <span class="card-label">linkedin</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 9h4l5-5v16l-5-5H3V9z"/><path d="M16 9v6"/><path d="M20 6v12"/></svg>
    <span class="card-label">audio</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M3 9h4l5-5v16l-5-5H3V9z"/><path d="M16 9l6 6"/><path d="M22 9l-6 6"/></svg>
    <span class="card-label">audio-off</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><rect x="6" y="3" width="12" height="12"/><rect x="10" y="7" width="4" height="4"/><path d="M12 15v6"/></svg>
    <span class="card-label">pin</span>
  </div>
  <div class="cell">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"><path d="M4 12h15"/><path d="M13 6l6 6-6 6"/></svg>
    <span class="card-label">arrow-right</span>
  </div>
</div>
</body>
</html>
